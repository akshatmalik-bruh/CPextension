<!DOCTYPE html>
<html>
<head>
    <title>Codeforces AI Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            min-height: 300px;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 16px;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
            display: block;
        }

        select, textarea {
            width: 100%;
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, textarea:focus {
            border-color: #7b2ff7;
        }

        select {
            margin-bottom: 12px;
            cursor: pointer;
        }

        textarea {
            height: 150px;
            resize: vertical;
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #7b2ff7, #00d2ff);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #results {
            display: none;
            margin-top: 14px;
            padding: 12px;
            background: #16213e;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a4a;
            font-size: 13px;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #aaa;
        }

        .result-value {
            font-weight: 600;
            color: #00d2ff;
        }

        .correct { color: #4caf50; }
        .incorrect { color: #f44336; }

        #explanation {
            margin-top: 10px;
            font-size: 12px;
            color: #ccc;
            line-height: 1.5;
        }

        #optimalCode {
            display: none;
            margin-top: 10px;
        }

        #optimalCode pre {
            background: #0f0f23;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            overflow-x: auto;
            color: #4caf50;
            max-height: 200px;
            overflow-y: auto;
        }

        #loading {
            display: none;
            text-align: center;
            margin-top: 14px;
            color: #7b2ff7;
            font-size: 13px;
        }

        #error {
            display: none;
            margin-top: 10px;
            padding: 8px;
            background: #2a0a0a;
            border: 1px solid #f44336;
            border-radius: 6px;
            color: #f44336;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1> CP AI Analyzer</h1>

    <div id="problemHeading" style="font-size:13px; color:#00d2ff; margin-bottom:12px; display:none;"></div>

   

    <label for="code">Paste your code</label>
    <textarea id="code" placeholder="Paste your solution code here..."></textarea>

    <button id="analyzeBtn">Analyze</button>

    <div id="loading"> Analyzing your code...</div>
    <div id="error"></div>

    <div id="results">
        <div class="result-row">
            <span class="result-label">Correct</span>
            <span class="result-value" id="isCorrect"></span>
        </div>
        <div class="result-row">
            <span class="result-label">Time Complexity</span>
            <span class="result-value" id="timeComplexity"></span>
        </div>
        <div class="result-row">
            <span class="result-label">Space Complexity</span>
            <span class="result-value" id="spaceComplexity"></span>
        </div>
        <div id="explanation"></div>
        <div id="optimalCode">
            <label>Optimal Solution</label>
            <pre id="optimalCodeContent"></pre>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
